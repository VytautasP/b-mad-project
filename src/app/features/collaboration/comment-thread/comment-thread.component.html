<div class="comment-thread">
  @if (showHeader) {
    <div class="section-header">
      <div class="section-title">
        <mat-icon>comment</mat-icon>
        <h3>Comments</h3>
        @if (comments().length > 0) {
          <span class="comment-count-badge">{{ comments().length }}</span>
        }
      </div>
    </div>
  }

  @if (isLoading()) {
    <div class="loading-state">
      <ui-spinner [diameter]="28" message="Loading comments..." [inline]="true" />
    </div>
  } @else if (hasLoadError()) {
    <ui-error-state heading="Couldn’t load comments right now." (retryClicked)="onRetryLoadComments()" />
  } @else {
    @if (comments().length === 0) {
      <ui-empty-state icon="chat_bubble_outline" heading="Be the first to comment" />
    } @else {
      <div class="comment-list">
        @for (comment of comments(); track comment.id) {
          <app-comment-item
            [comment]="comment"
            [currentUserId]="currentUserId"
            (edit)="onEditComment($event)"
            (delete)="onDeleteComment($event)"
            (mentionClick)="onMentionClick($event)">
          </app-comment-item>
        }
      </div>
    }

    <app-comment-form
      [isSubmitting]="isSubmitting()"
      (submitComment)="onPostComment($event)">
    </app-comment-form>
  }
</div>
