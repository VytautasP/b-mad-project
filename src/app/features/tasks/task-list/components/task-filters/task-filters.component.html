<div class="task-filters-container">
  <form [formGroup]="filterForm" class="filters-form">
    <div class="quick-filter-row">
      <div class="filter-field search-field">
        <ui-text-input
          label="Search"
          formControlName="searchTerm"
          placeholder="Search tasks..."
          prefixIcon="search"
        />
      </div>

      <div class="filter-field status-field">
        <ui-select
          label="Status"
          formControlName="status"
          [options]="statusOptions"
          [multiple]="true"
        />
      </div>

      <div class="filter-actions">
        <button mat-stroked-button type="button" (click)="onApplyFilters()">
          <mat-icon>check</mat-icon>
          Apply
        </button>
        <button mat-button type="button" (click)="onClearFilters()">
          <mat-icon>clear</mat-icon>
          Clear
        </button>
      </div>
    </div>

    <mat-expansion-panel
      class="filters-panel"
      [expanded]="advancedFiltersExpanded()"
      (opened)="advancedFiltersExpanded.set(true)"
      (closed)="advancedFiltersExpanded.set(false)">
      <mat-expansion-panel-header>
        <mat-panel-title>
          <mat-icon>tune</mat-icon>
          Advanced Filters
        </mat-panel-title>
      </mat-expansion-panel-header>

      <div class="filter-row">
        <div class="filter-field">
          <ui-select
            label="Assignees"
            formControlName="assigneeId"
            [options]="assigneeOptions"
            [multiple]="true"
          />
        </div>

        <div class="filter-field">
          <ui-select
            label="Priority"
            formControlName="priority"
            [options]="priorityOptions"
            [multiple]="true"
          />
        </div>

        <div class="filter-field">
          <ui-select
            label="Type"
            formControlName="type"
            [options]="typeOptions"
            [multiple]="true"
          />
        </div>
      </div>

      <div class="filter-row">
        <div class="filter-field">
          <ui-datepicker
            label="Due Date From"
            formControlName="dueDateFrom"
          />
        </div>

        <div class="filter-field">
          <ui-datepicker
            label="Due Date To"
            formControlName="dueDateTo"
          />
        </div>
      </div>
    </mat-expansion-panel>
  </form>

  <!-- Active Filter Chips -->
  @if (activeFilterChips().length > 0) {
    <div class="active-filters">
      <span class="filters-label">Active Filters:</span>
      <mat-chip-set>
        @for (chip of activeFilterChips(); track chip.key + chip.value) {
          <mat-chip [removable]="true" (removed)="removeFilter(chip)">
            {{ chip.displayText }}
            <mat-icon matChipRemove>cancel</mat-icon>
          </mat-chip>
        }
      </mat-chip-set>
    </div>
  }
</div>
