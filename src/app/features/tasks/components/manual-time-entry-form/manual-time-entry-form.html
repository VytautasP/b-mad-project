<div class="manual-time-entry-form">
  <h2 mat-dialog-title>Log Time</h2>

  <mat-dialog-content>
    <form [formGroup]="timeEntryForm">
      <!-- Quick Log Buttons -->
      <ui-quick-action-group
        [options]="quickLogOptions"
        (selectionChanged)="setQuickLog($event)"
      />

      <!-- Time Input Fields -->
      <div class="time-inputs">
        <ui-text-input
          label="Hours"
          type="number"
          formControlName="hours"
          [min]="0"
          [max]="23"
          [errorMessages]="{ min: 'Hours must be at least 0', max: 'Hours must be less than 24' }"
        />
        <ui-text-input
          label="Minutes"
          type="number"
          formControlName="minutes"
          [min]="0"
          [max]="59"
          [errorMessages]="{ min: 'Minutes must be at least 0', max: 'Minutes must be less than 60' }"
        />
      </div>

      @if (getTotalTimeError()) {
        <div class="total-time-error">
          {{ getTotalTimeError() }}
        </div>
      }

      <!-- Date Picker -->
      <ui-datepicker
        label="Date"
        formControlName="date"
      />

      <!-- Note Textarea -->
      <ui-textarea
        label="Note (optional)"
        formControlName="note"
        [rows]="3"
        [maxlength]="500"
        [showCharCount]="true"
      />
    </form>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <ui-button variant="text" (click)="onCancel()" [disabled]="isSubmitting">Cancel</ui-button>
    <ui-button
      variant="primary"
      [loading]="isSubmitting"
      [disabled]="isSubmitting || timeEntryForm.invalid"
      (click)="onSubmit()"
    >
      Log Time
    </ui-button>
  </mat-dialog-actions>
</div>
