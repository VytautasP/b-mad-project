<form
  [formGroup]="taskForm"
  (ngSubmit)="onSubmit()"
  class="task-form"
  [class.task-form--dialog]="isDialogMode"
  [class.task-form--embedded]="embedded"
  [attr.aria-labelledby]="isDialogMode ? dialogTitleId : null"
>
  @if (isDialogMode) {
    <header class="task-form__header">
      <div class="task-form__header-left">
        <div class="task-form__header-icon" aria-hidden="true">
          <mat-icon>edit_note</mat-icon>
        </div>
        <h2 [id]="dialogTitleId" class="task-form__title">{{ dialogTitle }}</h2>
      </div>
      <button
        mat-icon-button
        type="button"
        class="task-form__close"
        aria-label="Close task dialog"
        [disabled]="isSubmitting"
        (click)="onClose()"
      >
        <mat-icon>close</mat-icon>
      </button>
    </header>
  } @else if (!embedded) {
    <div class="task-form__standalone-heading">
      <h2 class="task-form__title">{{ dialogTitle }}</h2>
    </div>
  }

  <div class="task-form__body">
    @if (errorMessage) {
      <div class="task-form__error" role="alert" aria-live="assertive">
        {{ errorMessage }}
      </div>
    }

    <div class="task-form__field-group task-form__field-group--name">
      <ui-text-input
        #nameField
        label="Task Name"
        placeholder="e.g., Finalize Q3 Marketing Report"
        formControlName="name"
        [required]="true"
        [errorMessages]="{ required: 'Name is required', maxlength: 'Name is too long' }"
      ></ui-text-input>
    </div>

    <div class="task-form__field-group task-form__field-group--textarea">
      <ui-textarea
        label="Description"
        formControlName="description"
        [rows]="4"
      ></ui-textarea>
    </div>

    <div class="task-form__planning-grid" role="group" aria-label="Planning details">
      <div class="task-form__field-group">
        <ui-datepicker
          #dueDateField
          label="Due Date"
          formControlName="dueDate"
        ></ui-datepicker>
      </div>

      <div class="task-form__field-group">
        <ui-select
          label="Priority"
          formControlName="priority"
          [options]="priorityOptions"
          [errorMessages]="{ required: 'Priority is required' }"
        ></ui-select>
      </div>

      <div class="task-form__field-group">
        <ui-select
          label="Status"
          formControlName="status"
          [options]="statusOptions"
          [errorMessages]="{ required: 'Status is required' }"
        ></ui-select>
      </div>
    </div>

    <div class="task-form__field-group">
      <label class="task-form__label" id="task-form-type-label">
        <mat-icon class="task-form__label-icon">settings</mat-icon> Type
      </label>
      <div class="task-form__type-buttons" role="radiogroup" aria-labelledby="task-form-type-label">
        @for (type of types; track type) {
          <button
            type="button"
            class="task-form__type-btn"
            [class.task-form__type-btn--active]="taskForm.get('type')?.value === type"
            (click)="taskForm.get('type')?.setValue(type)"
            [attr.aria-checked]="taskForm.get('type')?.value === type"
            role="radio"
          >
            <mat-icon class="task-form__type-btn-icon">{{ getTypeIcon(type) }}</mat-icon>
            <span>{{ getTypeLabel(type) }}</span>
          </button>
        }
      </div>
    </div>
  </div>

  <footer class="task-form__footer" [class.task-form__footer--embedded]="embedded">
    <ui-button
      variant="text"
      class="task-form__cancel"
      (click)="onCancel()"
      [disabled]="isSubmitting"
    >
      Cancel
    </ui-button>

    <ui-button
      variant="primary"
      type="submit"
      class="task-form__submit"
      [loading]="isSubmitting"
      [disabled]="isSubmitting"
    >
      {{ isSubmitting ? submittingLabel : submitLabel }}
    </ui-button>
  </footer>
</form>
