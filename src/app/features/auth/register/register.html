<div class="flex min-h-screen items-center justify-center bg-gray-50 px-4 py-12 sm:px-6 lg:px-8">
  <mat-card class="w-full max-w-md">
    <mat-card-header class="pb-4">
      <mat-card-title class="text-center text-2xl font-bold">Create Account</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-4">
        <ui-text-input
          label="Full Name"
          placeholder="John Doe"
          formControlName="name"
          [errorMessages]="{ required: 'Name is required', minlength: 'Name must be at least 2 characters' }"
        />
        <ui-text-input
          label="Email"
          type="email"
          placeholder="you@example.com"
          formControlName="email"
          [errorMessages]="{ required: 'Email is required', email: 'Please enter a valid email address' }"
        />
        <ui-text-input
          label="Password"
          type="password"
          [showPasswordToggle]="true"
          formControlName="password"
          [errorMessages]="{
            required: 'Password is required',
            minlength: 'Password must be at least 8 characters',
            passwordStrength: 'Password must contain uppercase, lowercase, and number'
          }"
        />
        <ui-text-input
          label="Confirm Password"
          type="password"
          [showPasswordToggle]="true"
          formControlName="confirmPassword"
          [errorMessages]="{
            required: 'Please confirm your password',
            passwordMismatch: 'Passwords do not match'
          }"
        />
        <button mat-raised-button color="primary" type="submit" class="w-full" [disabled]="registerForm.invalid || isLoading">
          @if (isLoading) { <mat-spinner diameter="20" class="inline-block mr-2"></mat-spinner> }
          Create Account
        </button>
      </form>
      <div class="mt-4 text-center text-sm">
        <span class="text-gray-600">Already have an account?</span>
        <a routerLink="/login" class="ml-1 text-primary font-medium hover:underline">Sign in</a>
      </div>
    </mat-card-content>
  </mat-card>
</div>
