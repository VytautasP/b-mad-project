<h2 mat-dialog-title>Stop Timer</h2>
<mat-dialog-content>
  <p class="elapsed-time">Time tracked: <strong>{{ formatElapsedTime() }}</strong></p>
  
  <ui-textarea
    label="Note (optional)"
    [(ngModel)]="note"
    [maxlength]="500"
    [rows]="3"
    [showCharCount]="true"
  />
</mat-dialog-content>
<mat-dialog-actions align="end">
  <ui-button variant="text" (click)="onCancel()">Cancel</ui-button>
  <ui-button variant="primary" (click)="onSave()">Save</ui-button>
</mat-dialog-actions>
