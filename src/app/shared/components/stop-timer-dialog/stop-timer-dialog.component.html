<h2 mat-dialog-title>Stop Timer</h2>
<mat-dialog-content>
  <p class="elapsed-time">Time tracked: <strong>{{ formatElapsedTime() }}</strong></p>
  
  <ui-textarea
    label="Note (optional)"
    [(ngModel)]="note"
    [maxlength]="500"
    [rows]="3"
    [showCharCount]="true"
  />
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancel</button>
  <button mat-raised-button color="primary" (click)="onSave()">Save</button>
</mat-dialog-actions>
