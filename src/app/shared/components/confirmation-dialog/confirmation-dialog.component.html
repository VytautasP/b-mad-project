<h2 mat-dialog-title>{{ data.title }}</h2>
<mat-dialog-content>
  <p>{{ data.message }}</p>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <ui-button variant="text" (click)="onCancel()">
    {{ data.cancelText || 'Cancel' }}
  </ui-button>
  <ui-button variant="danger" (click)="onConfirm()" cdkFocusInitial>
    {{ data.confirmText || 'Confirm' }}
  </ui-button>
</mat-dialog-actions>
